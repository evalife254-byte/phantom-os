name: Nightly Build Check

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-check:
    name: Nightly Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3 ripgrep git

      - name: Lint all scripts
        run: |
          find scripts -name "*.sh" -exec shellcheck {} \;
          find build/phantom-overlay/airootfs/usr/local/bin -type f -exec shellcheck {} \;

      - name: Validate overlay
        run: ./scripts/validate-phantom-overlay.sh

      - name: Bootstrap check
        run: |
          ./scripts/bootstrap-phantom-v1.sh /tmp/phantom-nightly
          ./scripts/apply-phantom-overlay.sh
          ./scripts/validate-phantom-overlay.sh

      - name: Report status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly build check failed',
              body: 'The nightly validation check has failed. Please investigate.',
              labels: ['bug', 'ci']
            })
