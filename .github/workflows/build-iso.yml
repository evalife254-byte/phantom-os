name: Build Phantom OS ISO

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Skip artifact upload'
        required: false
        default: 'false'

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Arch Linux in Docker
        run: |
          docker run -d --name archiso-builder --privileged \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            archlinux:latest \
            tail -f /dev/null

      - name: Update system and install dependencies
        run: |
          docker exec archiso-builder bash -c "
            pacman -Syu --noconfirm
            pacman -S --noconfirm archiso git base-devel python
          "

      - name: Run bootstrap
        run: docker exec archiso-builder bash -c "./scripts/bootstrap-phantom-v1.sh"

      - name: Apply overlay
        run: docker exec archiso-builder bash -c "./scripts/apply-phantom-overlay.sh"

      - name: Validate overlay
        run: docker exec archiso-builder bash -c "./scripts/validate-phantom-overlay.sh"

      - name: Build ISO
        run: |
          docker exec archiso-builder bash -c "
            set -e
            # Low-RAM optimizations for GitHub Actions (7GB RAM)
            export XZ_OPT='-T2 -9 --memlimit-compress=1024MiB'
            export ZSTD_CLEVEL=19
            export ZSTD_NBTHREADS=2
            export MAKEFLAGS='-j2'
            
            # Create swap space if not already active
            if ! swapon --show | grep -q /swapfile; then
              if [ ! -f /swapfile ]; then
                echo 'Creating swap file...'
                fallocate -l 4G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=4096
                chmod 600 /swapfile
                mkswap /swapfile
              fi
              swapon /swapfile
              echo 'Swap activated'
            fi
            
            # Build with verbose output
            echo 'Starting mkarchiso build...'
            mkarchiso -v -w ./work -o ./out ./build/archiso-profile
            
            echo 'Build completed, checking output...'
            ls -lah ./out/
            
            # Remove swap
            swapoff /swapfile || true
            rm -f /swapfile
          " || exit 1

      - name: Stop container
        if: always()
        run: docker stop archiso-builder && docker rm archiso-builder

      - name: Verify build output
        run: |
          echo "Checking for build output..."
          ls -lah out/ || echo "out/ directory not found"
          ls -lah work/ || echo "work/ directory not found"

      - name: Get ISO filename
        id: iso
        run: |
          if [ -d out ] && [ -f out/*.iso ]; then
            ISO_FILE=$(ls out/*.iso | head -n1)
            echo "filename=$(basename $ISO_FILE)" >> $GITHUB_OUTPUT
            echo "path=$ISO_FILE" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No ISO file found in out/ directory"
            exit 1
          fi

      - name: Generate checksums
        run: |
          if [ -d out ]; then
            cd out
            sha256sum *.iso > SHA256SUMS
            md5sum *.iso > MD5SUMS
          else
            echo "ERROR: out/ directory not found"
            exit 1
          fi

      - name: Upload ISO artifact
        if: github.event.inputs.skip_upload != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phantom-os-iso
          path: |
            out/*.iso
            out/SHA256SUMS
            out/MD5SUMS
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/*.iso
            out/SHA256SUMS
            out/MD5SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
