<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  <!-- Phantom P logo stylized -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="url(#glow)" stroke-width="3" filter="url(#blur)"/>
  <circle cx="64" cy="64" r="50" fill="none" stroke="#00F0FF" stroke-width="2"/>
  <text x="64" y="80" font-family="sans-serif" font-size="48" font-weight="bold" fill="#00F0FF" text-anchor="middle">P</text>
  <!-- Orbiting particles -->
  <circle cx="20" cy="40" r="3" fill="#00F0FF" opacity="0.8"/>
  <circle cx="108" cy="88" r="2" fill="#7B68EE" opacity="0.8"/>
  <circle cx="100" cy="30" r="2.5" fill="#00F0FF" opacity="0.6"/>
</svg>
