<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Phantom Browser App Icon -->
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0A0F" stroke="#00F0FF" stroke-width="2"/>
  
  <!-- Browser window -->
  <rect x="12" y="18" width="40" height="28" rx="3" fill="#1A1A2E" stroke="#00F0FF" stroke-width="1.5"/>
  
  <!-- Address bar -->
  <rect x="14" y="20" width="36" height="6" rx="2" fill="#141420" stroke="#00F0FF" stroke-width="1"/>
  
  <!-- Window controls (dots) -->
  <circle cx="17" cy="23" r="1.5" fill="#FF6B6B"/>
  <circle cx="21" cy="23" r="1.5" fill="#FFD93D"/>
  <circle cx="25" cy="23" r="1.5" fill="#6BCF7F"/>
  
  <!-- Content area with phantom glow -->
  <rect x="14" y="28" width="36" height="16" rx="2" fill="#0A0A0F"/>
  
  <!-- Globe/web icon -->
  <circle cx="32" cy="36" r="6" fill="none" stroke="#00F0FF" stroke-width="1.5"/>
  <ellipse cx="32" cy="36" rx="3" ry="6" fill="none" stroke="#00F0FF" stroke-width="1"/>
  <line x1="26" y1="36" x2="38" y2="36" stroke="#00F0FF" stroke-width="1"/>
  
  <!-- Phantom glow -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.2"/>
</svg>
