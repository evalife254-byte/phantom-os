        opacity="0.7"/>
  
  <!-- Right folder (in front) -->
  <path d="M 32 26 L 32 44 C 32 45 33 46 34 46 L 48 46 C 49 46 50 45 50 44 L 50 32 C 50 31 49 30 48 30 L 40 30 L 38 28 L 34 28 C 33 28 32 29 32 30 Z" 
        fill="#1A1A2E" 
        stroke="#00F0FF" 
