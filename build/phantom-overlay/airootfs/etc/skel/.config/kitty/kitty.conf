# Phantom OS Kitty Configuration
# Ghost Protocol Theme

# Font
font_family      Noto Sans Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Theme
cursor                  #00F0FF
cursor_text_color       #0A0A0F
foreground              #E0E0E8
background              #0A0A0F
selection_foreground    #0A0A0F
selection_background    #00F0FF
color0                  #141420
color8                  #1A1A2E
color1                  #FF6B6B
color9                  #FF8585
color2                  #6BCF7F
color10                 #85E89A
color3                  #FFD93D
color11                 #FFE066
color4                  #00F0FF
color12                 #66F5FF
color5                  #7B68EE
color13                 #998AFF
color6                  #00F0FF
color14                 #66F5FF
color7                  #E0E0E8
color15                 #FFFFFF

# Window
window_padding_width 4
hide_window_decorations yes
background_opacity 0.95

# Behavior
enable_audio_bell no
scrollback_lines 10000
mouse_hide_wait 3.0

# GPU/Rendering - disable for compatibility
# If kitty crashes, these settings help
linux_display_server wayland
# Disable GPU rendering if causing issues
# render_engine software

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
active_tab_foreground   #0A0A0F
active_tab_background   #00F0FF
inactive_tab_foreground #E0E0E8
inactive_tab_background #1A1A2E
tab_bar_background      #0A0A0F
