# Phantom OS — hyprlock configuration
# Theme: Ghost Protocol

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Lock icon at top
image {
    monitor =
    path = /usr/share/icons/phantom-lock.svg
    size = 64
    border_size = 2
    border_color = rgba(0, 240, 255, 0.5)
    position = 0, -280
    halign = center
    valign = center
}
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(0, 240, 255, 1.0)
    font_size = 120
    font_family = Noto Sans
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(224, 224, 232, 0.8)
    font_size = 24
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

# Battery status
label {
    monitor =
    text = cmd[update:5000] echo "🔋 $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo 'AC')%"
    color = rgba(224, 224, 232, 0.6)
    font_size = 16
    font_family = Noto Sans
    position = 30, -30
    halign = left
    valign = top
}

# Now playing
label {
    monitor =
    text = cmd[update:2000] playerctl metadata --format '🎵 {{ artist }} - {{ title }}' 2>/dev/null || echo ''
    color = rgba(123, 104, 238, 0.8)
    font_size = 14
    font_family = Noto Sans
    position = 0, -30
    halign = center
    valign = top
}

# Input field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(0, 240, 255, 0.5)
    inner_color = rgba(26, 26, 46, 0.8)
    font_color = rgba(224, 224, 232, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##6B6B80">Enter password to unlock...</span>
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
    check_color = rgba(107, 207, 127, 1.0)
    fail_color = rgba(255, 107, 107, 1.0)
    fail_text = <span foreground="##FF6B6B">Authentication failed - try again</span>
    capslock_color = rgba(255, 217, 61, 1.0)
}

# User avatar (if available)
image {
    monitor =
    path = ~/.face
    size = 90
    border_size = 3
    border_color = rgba(0, 240, 255, 0.6)
    position = 0, -50
    halign = center
    valign = center
}
