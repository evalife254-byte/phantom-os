# Phantom OS v1 — Hyprland configuration
# Theme: Ghost Protocol

# ── Monitor ──────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Variables ────────────────────────────────────────────
$mod = SUPER
$terminal = kitty
$launcher = rofi -show drun

# ── Autostart ────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Input ────────────────────────────────────────────────
input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    natural_scroll = true
    tap-to-click = true
  }
}

# ── General ──────────────────────────────────────────────
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(00f0ffee)
  col.inactive_border = rgba(141420ee)
  layout = dwindle
}

# ── Decoration ───────────────────────────────────────────
decoration {
  rounding = 12
  active_opacity = 0.95
  inactive_opacity = 0.85

  blur {
    enabled = true
    size = 8
    passes = 2
  }

  shadow {
    enabled = true
    range = 12
    render_power = 3
    color = rgba(0a0a0f99)
  }
}

# ── Animations ───────────────────────────────────────────
animations {
  enabled = yes

  bezier = smoothPop, 0.4, 0.0, 0.2, 1.0
  bezier = smoothSlide, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, smoothPop, slide
  animation = windowsOut, 1, 5, smoothPop, slide
  animation = fade, 1, 4, smoothPop
  animation = workspaces, 1, 4, smoothSlide, slide
}

# ── Keybinds ─────────────────────────────────────────────
bind = $mod, RETURN, exec, $terminal
bind = $mod, SPACE, exec, $launcher
bind = $mod, Q, killactive,
bind = $mod, L, exec, hyprlock
bind = $mod, F, fullscreen,
bind = $mod, V, togglefloating,
bind = $mod SHIFT, Q, exit,
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Window Rules ─────────────────────────────────────────
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save File)(.*)$
windowrulev2 = float, title:^(File Upload)(.*)$

# ── Layer Rules ──────────────────────────────────────────
layerrule = blur, waybar
layerrule = blur, rofi
