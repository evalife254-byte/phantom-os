# Phantom OS — Kernel module performance tuning

# Enable NVMe polling for lower latency
options nvme_core poll_queues=2

# Intel GPU optimizations
options i915 enable_guc=3 enable_fbc=1

# AMD GPU optimizations  
options amdgpu ppfeaturemask=0xffffffff

# Disable watchdog (reduces overhead)
blacklist iTCO_wdt
blacklist iTCO_vendor_support
