# Phantom OS Package Installation Configuration

backend: pacman

operations:
  - remove:
    # Remove live environment packages
    - calamares
    - arch-install-scripts
    - memtest86+
    
  - install:
    # Ensure core packages are installed
    - base
    - linux
    - linux-firmware
    - grub
    - efibootmgr
    - networkmanager
    - sudo
    
  - try_install:
    # Optional packages (don't fail if missing)
    - os-prober
    - ntfs-3g
    
  - localInstall:
    # Install from local packages if available
    []
